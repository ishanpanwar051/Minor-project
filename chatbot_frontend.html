<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - EduGuard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .chat-container {
            max-width: 800px;
            margin: 30px auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .chat-header h3 {
            margin: 0;
            font-weight: 600;
        }
        
        .chat-status {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #4CAF50;
            border-radius: 50%;
            margin-left: 10px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message.bot {
            justify-content: flex-start;
        }
        
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            position: relative;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-right: 10px;
        }
        
        .message.bot .message-content {
            background: white;
            border: 1px solid #e0e0e0;
            margin-left: 10px;
        }
        
        .message-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: white;
        }
        
        .message.user .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .message.bot .message-avatar {
            background: #4CAF50;
        }
        
        .message-time {
            font-size: 11px;
            color: #666;
            margin-top: 5px;
        }
        
        .message-source {
            font-size: 10px;
            color: #999;
            margin-top: 3px;
            font-style: italic;
        }
        
        .typing-indicator {
            display: none;
            padding: 10px 15px;
            background: #e0e0e0;
            border-radius: 18px;
            margin: 10px 0;
            max-width: 100px;
        }
        
        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }
        
        .chat-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
            font-size: 16px;
            resize: none;
        }
        
        .chat-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .send-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .send-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .chat-actions {
            padding: 10px 20px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .action-button {
            background: none;
            border: 1px solid #ddd;
            padding: 5px 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }
        
        .action-button:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .emotional-indicator {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .emotional-indicator.sad { background: #ffebee; color: #c62828; }
        .emotional-indicator.stressed { background: #fff3e0; color: #ef6c00; }
        .emotional-indicator.tired { background: #e8f5e8; color: #2e7d32; }
        .emotional-indicator.confused { background: #e3f2fd; color: #1565c0; }
        .emotional-indicator.demotivated { background: #fce4ec; color: #ad1457; }
        
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            border-left: 4px solid #c62828;
        }
        
        .success-message {
            background: #e8f5e8;
            color: #2e7d32;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            border-left: 4px solid #2e7d32;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Chat Header -->
        <div class="chat-header">
            <h3>
                <i class="fas fa-robot me-2"></i>
                AI Assistant
                <span class="chat-status"></span>
            </h3>
            <small>Your personal academic and motivational support</small>
        </div>
        
        <!-- Chat Messages -->
        <div class="chat-messages" id="chatMessages">
            <div class="text-center text-muted my-3">
                <i class="fas fa-info-circle me-2"></i>
                Hello! I'm your AI assistant. I can help you with studying, motivation, career advice, and stress management. How can I assist you today?
            </div>
        </div>
        
        <!-- Typing Indicator -->
        <div class="typing-indicator" id="typingIndicator">
            <span></span>
            <span></span>
            <span></span>
        </div>
        
        <!-- Chat Input -->
        <div class="chat-input-container">
            <div class="input-group">
                <textarea 
                    class="chat-input" 
                    id="messageInput" 
                    placeholder="Type your message here..."
                    rows="2"
                    maxlength="500"></textarea>
                <button class="send-button" id="sendButton" onclick="sendMessage()">
                    <i class="fas fa-paper-plane me-2"></i>Send
                </button>
            </div>
        </div>
        
        <!-- Chat Actions -->
        <div class="chat-actions">
            <div>
                <button class="action-button" onclick="clearChat()">
                    <i class="fas fa-trash me-1"></i>Clear Chat
                </button>
                <button class="action-button" onclick="exportChat()">
                    <i class="fas fa-download me-1"></i>Export
                </button>
            </div>
            <div>
                <small class="text-muted">
                    <i class="fas fa-shield-alt me-1"></i>
                    Your conversations are private and secure
                </small>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Chat state management
        let chatHistory = [];
        let isTyping = false;
        
        // DOM elements
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const typingIndicator = document.getElementById('typingIndicator');
        
        // Initialize chat
        document.addEventListener('DOMContentLoaded', function() {
            checkChatStatus();
            setupEventListeners();
            loadChatHistory();
        });
        
        // Setup event listeners
        function setupEventListeners() {
            // Enter key to send message
            messageInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            // Auto-resize textarea
            messageInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });
        }
        
        // Check chatbot status
        async function checkChatStatus() {
            try {
                const response = await fetch('/api/chat/status');
                const data = await response.json();
                
                if (data.status === 'online') {
                    console.log('Chatbot is online');
                    console.log('Features:', data.features);
                }
            } catch (error) {
                console.error('Failed to check chatbot status:', error);
            }
        }
        
        // Send message to chatbot
        async function sendMessage() {
            const message = messageInput.value.trim();
            
            if (!message || isTyping) {
                return;
            }
            
            // Add user message to chat
            addMessageToChat('user', message);
            messageInput.value = '';
            messageInput.style.height = 'auto';
            
            // Show typing indicator
            showTypingIndicator();
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message
                    })
                });
                
                const data = await response.json();
                
                hideTypingIndicator();
                
                if (data.status === 'success') {
                    addMessageToChat('bot', data.reply, {
                        source: data.source,
                        emotional_state: data.emotional_state,
                        timestamp: data.timestamp
                    });
                } else {
                    addErrorMessage(data.error || 'Failed to get response');
                }
                
            } catch (error) {
                hideTypingIndicator();
                addErrorMessage('Connection error. Please try again.');
                console.error('Chat error:', error);
            }
        }
        
        // Add message to chat
        function addMessageToChat(sender, message, metadata = {}) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.innerHTML = sender === 'user' ? 
                '<i class="fas fa-user"></i>' : 
                '<i class="fas fa-robot"></i>';
            
            const content = document.createElement('div');
            content.className = 'message-content';
            
            // Main message
            const messageText = document.createElement('div');
            messageText.innerHTML = formatMessage(message);
            content.appendChild(messageText);
            
            // Timestamp
            const time = document.createElement('div');
            time.className = 'message-time';
            time.textContent = new Date().toLocaleTimeString();
            content.appendChild(time);
            
            // Source indicator (for bot messages)
            if (sender === 'bot' && metadata.source) {
                const source = document.createElement('div');
                source.className = 'message-source';
                source.textContent = `Source: ${metadata.source}`;
                content.appendChild(source);
            }
            
            // Emotional state indicator
            if (sender === 'bot' && metadata.emotional_state) {
                const emotional = document.createElement('span');
                emotional.className = `emotional-indicator ${metadata.emotional_state}`;
                emotional.textContent = metadata.emotional_state;
                content.appendChild(emotional);
            }
            
            messageDiv.appendChild(content);
            messageDiv.appendChild(avatar);
            
            chatMessages.appendChild(messageDiv);
            scrollToBottom();
            
            // Save to history
            chatHistory.push({
                sender: sender,
                message: message,
                metadata: metadata,
                timestamp: new Date().toISOString()
            });
            
            saveChatHistory();
        }
        
        // Format message with basic markdown
        function formatMessage(message) {
            return message
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/(\d+\.\s)/g, '<br>$1'); // Numbered lists
        }
        
        // Show/hide typing indicator
        function showTypingIndicator() {
            isTyping = true;
            typingIndicator.style.display = 'block';
            sendButton.disabled = true;
            scrollToBottom();
        }
        
        function hideTypingIndicator() {
            isTyping = false;
            typingIndicator.style.display = 'none';
            sendButton.disabled = false;
        }
        
        // Add error message
        function addErrorMessage(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.innerHTML = `<i class="fas fa-exclamation-triangle me-2"></i>${message}`;
            chatMessages.appendChild(errorDiv);
            scrollToBottom();
        }
        
        // Clear chat
        async function clearChat() {
            if (confirm('Are you sure you want to clear the chat history?')) {
                try {
                    await fetch('/api/chat/clear', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        }
                    });
                    
                    chatMessages.innerHTML = `
                        <div class="text-center text-muted my-3">
                            <i class="fas fa-info-circle me-2"></i>
                            Chat cleared. How can I help you today?
                        </div>
                    `;
                    chatHistory = [];
                    saveChatHistory();
                    
                } catch (error) {
                    addErrorMessage('Failed to clear chat');
                    console.error('Clear chat error:', error);
                }
            }
        }
        
        // Export chat
        function exportChat() {
            if (chatHistory.length === 0) {
                addErrorMessage('No chat history to export');
                return;
            }
            
            const exportData = {
                export_date: new Date().toISOString(),
                total_messages: chatHistory.length,
                conversation: chatHistory
            };
            
            const blob = new Blob([JSON.stringify(exportData, null, 2)], {
                type: 'application/json'
            });
            
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `chat_export_${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        // Scroll to bottom
        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // Save/load chat history
        function saveChatHistory() {
            try {
                localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
            } catch (error) {
                console.error('Failed to save chat history:', error);
            }
        }
        
        function loadChatHistory() {
            try {
                const saved = localStorage.getItem('chatHistory');
                if (saved) {
                    chatHistory = JSON.parse(saved);
                    // Rebuild chat UI from history
                    chatHistory.forEach(item => {
                        addMessageToChat(item.sender, item.message, item.metadata);
                    });
                }
            } catch (error) {
                console.error('Failed to load chat history:', error);
            }
        }
    </script>
</body>
</html>
